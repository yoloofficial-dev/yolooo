<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximerix | Stats</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Push footer to bottom and center content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .stats-coming-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: 0.3s;
        }

        .stats-coming-card:hover {
            border-color: rgba(0, 245, 147, 0.2);
            transform: translateY(-3px);
        }

        .stats-coming-card i {
            font-size: 40px;
            color: var(--text-muted);
        }

        .stats-coming-card p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="logo.png" alt="Logo" class="header-logo">
        </div>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="status.html">STATUS</a>
            <a href="servers.html">SERVERS</a>
            <a href="stats.html" class="active">STATS</a>
        </nav>
        <a href="https://mcserverhost.com" target="_blank" class="header-cta"><i class="fas fa-arrow-right"></i> WEBSITE</a>
    </header>

    <main>
        <!-- Just the card, exactly like your screenshot -->
        <div class="stats-coming-card">
            <i class="fas fa-wrench"></i>
            <p>Coming soon..</p>
        </div>
    </main>

    <footer>
        <span>Copyright &copy; 2026. All rights reserved.</span>
        <span>Credits to Maxim75000</span>
        <span>Not an official MCServerlist Inc. service.</span>
    </footer>

</body>
</html>
