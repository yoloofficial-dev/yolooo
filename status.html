<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolooo | System Status</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .service-alert-banner {
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 2px solid rgba(255, 82, 82, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            color: #ff5252;
            font-weight: 600;
            align-items: center;
            gap: 12px;
        }
        .service-alert-banner.active { display: flex; }

        .section-heading {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .service-card {
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass); border-radius: 16px;
            padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; transition: 0.2s;
        }
        .service-card:hover { border-color: rgba(0, 245, 147, 0.4); transform: translateY(-2px); }
        .service-top { display: flex; justify-content: space-between; align-items: center; }
        .service-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .service-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .service-dot.online { background: var(--primary-color); box-shadow: 0 0 10px rgba(0, 245, 147, 0.3); }
        .service-dot.offline { background: #ff5252; }
        .service-dot.pending { background: var(--text-muted); }
        .service-card.is-pinging { opacity: 0.45; }
        .service-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        .service-latency { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .region-header { 
            background: var(--bg-card); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border-glass); 
            border-radius: 16px; 
            padding: 16px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-left: 4px solid var(--primary-color); 
            transition: all 0.3s ease;
        }
        
        .region-header.danger-zone {
            border-left: 4px solid #ff5252;
            background: rgba(255, 82, 82, 0.08);
            border-color: rgba(255, 82, 82, 0.3);
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.15), inset 0 0 20px rgba(255, 82, 82, 0.05);
        }
        .region-header.danger-zone h2 {
            color: #ff5252;
        }
        .region-header.danger-zone .region-left p {
            color: #ff8a8a;
        }

        .region-left { display: flex; align-items: center; gap: 12px; }
        .region-left h2 { font-size: 18px; font-weight: 700; color: var(--text-main); transition: color 0.3s ease;}
        .region-left p { font-size: 13px; color: var(--text-muted); transition: color 0.3s ease;}

        .load-warning-badge {
            display: none;
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 82, 82, 0.3);
            margin-left: 10px;
            text-transform: uppercase;
        }
        .region-header.danger-zone .load-warning-badge {
            display: inline-block;
        }

        .node-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
        .node-card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 16px; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; cursor: pointer; transition: 0.2s; }
        .node-card:hover { border-color: rgba(0, 245, 147, 0.5); transform: translateY(-2px); }
        .node-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .node-name { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; }
        .node-name i { color: var(--primary-color); font-size: 16px; }
        .node-name span { font-size: 13px; color: var(--text-muted); font-weight: 400; }
        
        .node-stats { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
        .stat-row { display: flex; align-items: center; gap: 8px; }
        .stat-row .label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); width: 80px; }
        .stat-row .label i { font-size: 12px; }
        .progress-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .progress-fill.green { background: var(--primary-color); }
        .progress-fill.red { background: #ff5252; }
        .progress-fill.yellow { background: #ffc107; }
        .stat-row .val { font-size: 12px; font-weight: 600; min-width: 25px; text-align: right; }

        .node-card.is-full { opacity: 0.55; }
        .node-card.is-pinging { opacity: 0.45; }
        .node-card.is-pinging .stats-loading-note {
            animation: pulseLatency 1.2s ease-in-out infinite;
        }
        @keyframes pulseLatency {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .node-full-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            color: #ff5252; background: rgba(255,82,82,0.15);
            border: 1px solid rgba(255,82,82,0.3); border-radius: 20px;
            padding: 2px 8px; margin-left: 6px;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--bg-card); border: 1px solid var(--border-glass);
            border-radius: 16px; width: 90%; max-width: 900px;
            max-height: 90vh; display: flex; flex-direction: row; padding: 25px; position: relative;
            animation: fadeUp 0.3s ease-out;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal-left { width: 50%; padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .modal-node-info h2 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .modal-node-info h2 i { color: var(--primary-color); }
        .modal-node-info .loc { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 14px; color: var(--text-main); }
        .modal-close { background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .stats-table {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden;
            margin-bottom: 15px;
        }
        .stats-cell {
            padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02);
        }
        .stats-cell:nth-last-child(1), .stats-cell:nth-last-child(2) { border-bottom: none; }
        .stats-cell span:first-child { color: var(--text-muted); font-size: 14px; }
        .stats-cell span:last-child { font-weight: 600; font-size: 14px; }
        .stats-cell span.green { color: var(--primary-color); }
        .stats-cell span.yellow { color: #ffc107; }
        .stats-cell span.red { color: #ff5252; }

        .modal-history-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .history-dot { 
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #0b0e1a;
        }
        .history-dot.green { background: var(--primary-color); }
        .history-dot.red { background: #ff5252; }
        .day-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 2px; }

        .modal-right { width: 50%; padding-left: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 80vh; }
        .modal-right-title { font-size: 16px; font-weight: 600; color: var(--text-muted); }

        .incident-row { background: rgba(255,82,82,0.05); border: 1px solid rgba(255,82,82,0.2); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .incident-row i { color: #ff5252; font-size: 16px; }
        .incident-row .duration { font-weight: 700; font-size: 15px; }
        .incident-row .time { color: var(--text-muted); font-size: 14px; }

        @media (max-width: 1024px) { .services-grid, .node-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .modal-box { flex-direction: column; height: auto; max-height: 90vh; padding: 18px; }
            .modal-left, .modal-right { width: 100%; padding: 0; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
            .modal-right { padding-top: 15px; max-height: none; border-bottom: none; overflow-y: auto; }
            .stats-table { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .services-grid, .node-grid { grid-template-columns: 1fr; gap: 12px; }
            main { padding-left: 12px; padding-right: 12px; }
            .region-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
            .node-card, .service-card { padding: 14px 16px; }
            .node-name { flex-wrap: wrap; font-size: 14px; }
            .stat-row .label { width: 66px; font-size: 10px; }
            .modal-overlay { padding: 12px; }
            .modal-box { width: 100%; padding: 14px; }
            .modal-node-info h2 { font-size: 20px; }
            .modal-history-row { justify-content: center; }
            .history-dot { width: 24px; height: 24px; }
            .incident-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand"><img src="logo.png" alt="Logo" class="header-logo"></div>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="status.html" class="active">STATUS</a>
            <a href="servers.html">SERVERS</a>
            <a href="stats.html">STATS</a>
        </nav>
        <a href="https://mcserverhost.com" target="_blank" class="header-cta"><i class="fas fa-arrow-right"></i> WEBSITE</a>
    </header>

    <main>
        <div class="page-title">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Status</span>
        </div>

        <div class="service-alert-banner" id="alertBanner">
            <i class="fas fa-triangle-exclamation"></i>
            <span>One or more services are currently experiencing issues.</span>
        </div>

        <div class="section-heading">Core Services</div>
        <div class="services-grid" id="servicesGrid"></div>

        <div id="statusContent"></div>
    </main>

    <footer>
        <span>Copyright &copy; 2026. All rights reserved.</span>
        <p style="margin:0">
            Credits to <a href="https://maximerix.dev" style="color: inherit;text-decoration: none;">MaximeriX</a>
        </p>
        <span>Not an official MCServerlist Inc. service.</span>
    </footer>

    <div class="modal-overlay" id="nodeModal">
        <div class="modal-box">
            <div class="modal-left">
                <div class="modal-header">
                    <div class="modal-node-info">
                        <h2><i class="fas fa-circle" style="color:var(--primary-color);"></i> <span id="modalNodeName">Node Name</span></h2>
                        <div class="loc">
                            <img id="modalNodeFlag" src="" alt="Flag" style="width: 20px; height: 14px; border-radius: 2px; object-fit: cover; margin-right: 4px;">
                            <span id="modalNodeLocation">Location</span>
                        </div>
                    </div>
                    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>

                <div class="stats-table" id="modalStatsTable"></div>
                <div class="modal-history-row" id="modalHistoryRow"></div>
            </div>

            <div class="modal-right">
                <div class="modal-right-title">Recent Incidents</div>
                <div id="modalIncidents"></div>
            </div>
        </div>
    </div>

<script>
    let allNodesData = [];
    let renderedNodeKeys = null;
    let renderedServiceKeys = null;
    let currentOpenModalNode = null;

    const staticServiceData = [
        { name: "Main Website", description: "Website hosting and frontend services", url: "https://www.mcserverhost.com" },
        { name: "MCServerHost API", description: "Server management and backend infrastructure", url: "https://api.mcserverhost.com" },
        { name: "Cloudflare API", description: "Global CDN, DDoS protection, and DNS services", url: "https://api.cloudflare.com" },
        { name: "Stripe API", description: "Credit card and subscription payment processing", url: "https://api.stripe.com/v1/customers" },
        { name: "PayPal API", description: "Digital wallet, invoicing, and online payment processing", url: "https://api.paypal.com" },
        { name: "Solana API", description: "Blockchain network and cryptocurrency transactions", url: "https://api.mainnet-beta.solana.com" }
    ];

    function normalizeHost(url) {
        try {
            return new URL(url).hostname.replace(/^www\./, '');
        } catch (e) {
            return url;
        }
    }

    function findLiveService(apiServices, staticSvc) {
        const targetHost = normalizeHost(staticSvc.url);
        return apiServices.find(s => normalizeHost(s.url) === targetHost);
    }

    const locationConfig = {
        'free.frankfurt': { flag: 'uk.png', displayName: 'London, England' },
        'free.newyork': { flag: 'us.png', displayName: 'New York, USA' },
        'free.singapore': { flag: 'sg.png', displayName: 'Singapore, Asia' }
    };

    const nodeRoster = {
        'free.frankfurt': [
            'adonis', 'aglaea', 'ajax', 'alcyone', 'anteros', 'ares', 'atlas',
            'artemis', 'apollo', 'athena', 'achilles', 'aphrodite', 'aeolus',
            'aether', 'asclepius', 'atreus'
        ],
        'free.newyork': [
            'cronus', 'ceres', 'dryas', 'deimos', 'dymos', 'dorsis', 'darius',
            'dryden', 'damaris', 'dione', 'daedalus', 'decimus', 'dorian', 'delphus'
        ],
        'free.singapore': [
            'ceto', 'cybele', 'calliope', 'castor', 'clio', 'cratos', 'caelus',
            'cassiopeia', 'chiron', 'calypso', 'cerberus', 'circe', 'callisto',
            'carina', 'corvus', 'cygnus'
        ]
    };
    const order = ['free.frankfurt', 'free.newyork', 'free.singapore'];

    function colorClass(val) { return val > 75 ? 'red' : (val > 50 ? 'yellow' : 'green'); }

    function fetchWithTimeout(url, ms) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), ms);
        return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
    }

    function renderServicesSkeleton() {
        const servicesDiv = document.getElementById('servicesGrid');
        const frag = document.createDocumentFragment();

        staticServiceData.forEach(staticSvc => {
            const card = document.createElement('div');
            card.className = 'service-card is-pinging';
            card.dataset.url = staticSvc.url;
            card.innerHTML = `
                <div class="service-top">
                    <div class="service-name"><span class="service-dot pending"></span> ${staticSvc.name}</div>
                    <div class="service-latency">--</div>
                </div>
                <div class="service-desc">${staticSvc.description}</div>
            `;
            frag.appendChild(card);
        });

        servicesDiv.innerHTML = '';
        servicesDiv.appendChild(frag);
        renderedServiceKeys = staticServiceData.map(s => s.url).join('|');
    }

    function renderServiceCard(staticSvc, liveSvc) {
        const isOnline = liveSvc ? liveSvc.status === 'online' : false;
        const statusClass = isOnline ? 'online' : 'offline';
        const latency = liveSvc && liveSvc.latency_ms ? Math.round(liveSvc.latency_ms) + 'ms' : '--';

        const card = document.createElement('div');
        card.className = 'service-card';
        card.dataset.url = staticSvc.url;
        card.innerHTML = `
            <div class="service-top">
                <div class="service-name"><span class="service-dot ${statusClass}"></span> ${staticSvc.name}</div>
                <div class="service-latency">${latency}</div>
            </div>
            <div class="service-desc">${staticSvc.description}</div>
        `;
        return card;
    }

    function updateServiceCard(card, staticSvc, liveSvc) {
        const isOnline = liveSvc ? liveSvc.status === 'online' : false;
        const statusClass = isOnline ? 'online' : 'offline';
        const latency = liveSvc && liveSvc.latency_ms ? Math.round(liveSvc.latency_ms) + 'ms' : '--';

        card.classList.remove('is-pinging');

        const dot = card.querySelector('.service-dot');
        if (dot) dot.className = `service-dot ${statusClass}`;
        const latEl = card.querySelector('.service-latency');
        if (latEl) latEl.textContent = latency;
    }

    function renderServicesGrid(apiServices) {
        const servicesDiv = document.getElementById('servicesGrid');
        const newKeys = staticServiceData.map(s => s.url).join('|');
        let isDown = false;

        const canUpdateInPlace = renderedServiceKeys === newKeys && servicesDiv.children.length === staticServiceData.length;

        if (canUpdateInPlace) {
            staticServiceData.forEach((staticSvc, i) => {
                const liveSvc = findLiveService(apiServices, staticSvc);
                if (liveSvc ? liveSvc.status !== 'online' : true) isDown = true;
                updateServiceCard(servicesDiv.children[i], staticSvc, liveSvc);
            });
        } else {
            const frag = document.createDocumentFragment();
            staticServiceData.forEach(staticSvc => {
                const liveSvc = findLiveService(apiServices, staticSvc);
                if (liveSvc ? liveSvc.status !== 'online' : true) isDown = true;
                frag.appendChild(renderServiceCard(staticSvc, liveSvc));
            });
            servicesDiv.innerHTML = '';
            servicesDiv.appendChild(frag);
            renderedServiceKeys = newKeys;
        }

        const alertBanner = document.getElementById('alertBanner');
        isDown ? alertBanner.classList.add('active') : alertBanner.classList.remove('active');
    }

    function buildNodeCardHtml(node, skeleton) {
        if (skeleton) {
            return `
                <div class="node-top">
                    <div class="node-name">
                        <i class="fas fa-circle" style="color:var(--text-muted);"></i> 
                        ${node.name}
                        <span class="node-latency-val">--ms</span>
                        <span class="node-full-slot"></span>
                    </div>
                    <div class="node-status-text" style="font-weight:600; font-size:14px; color:var(--text-muted);">--</div>
                </div>
                <div class="node-stats">
                    <div class="stat-row"><div class="label"><i class="fas fa-microchip"></i> CPU</div><div class="progress-track"><div class="progress-fill" style="width: 0%;"></div></div><div class="val">--</div></div>
                    <div class="stat-row"><div class="label"><i class="fas fa-memory"></i> Memory</div><div class="progress-track"><div class="progress-fill" style="width: 0%;"></div></div><div class="val">--</div></div>
                    <div class="stat-row"><div class="label"><i class="fas fa-hdd"></i> Disk</div><div class="progress-track"><div class="progress-fill" style="width: 0%;"></div></div><div class="val">--</div></div>
                </div>
            `;
        }
        const statusColor = node.isOnline ? 'var(--primary-color)' : '#ff5252';
        return `
            <div class="node-top">
                <div class="node-name">
                    <i class="fas fa-circle" style="color:${statusColor};"></i> 
                    ${node.name}
                    <span class="node-latency-val">${node.latency !== null ? node.latency + 'ms' : '--ms'}</span>
                    <span class="node-full-slot">${node.isFull ? '<span class="node-full-badge">Full</span>' : ''}</span>
                </div>
                <div class="node-status-text" style="font-weight:600; font-size:14px; color:${statusColor};">${node.isOnline ? 'Online' : 'Offline'}</div>
            </div>
            <div class="node-stats">
                <div class="stat-row"><div class="label"><i class="fas fa-microchip"></i> CPU</div><div class="progress-track"><div class="progress-fill ${colorClass(node.cpu)}" style="width: ${node.cpu}%;"></div></div><div class="val">${node.cpu}%</div></div>
                <div class="stat-row"><div class="label"><i class="fas fa-memory"></i> Memory</div><div class="progress-track"><div class="progress-fill ${colorClass(node.ram)}" style="width: ${node.ram}%;"></div></div><div class="val">${node.ram}%</div></div>
                <div class="stat-row"><div class="label"><i class="fas fa-hdd"></i> Disk</div><div class="progress-track"><div class="progress-fill ${colorClass(node.disk)}" style="width: ${node.disk}%;"></div></div><div class="val">${node.disk}%</div></div>
            </div>
        `;
    }

    function updateNodeCardDom(card, node) {
        const statusColor = node.isOnline ? 'var(--primary-color)' : '#ff5252';

        card.classList.toggle('is-full', node.isFull);

        const dotIcon = card.querySelector('.node-top .node-name > i.fa-circle');
        if (dotIcon) dotIcon.style.color = statusColor;

        const latencySpan = card.querySelector('.node-latency-val');
        if (latencySpan) latencySpan.textContent = node.latency !== null ? node.latency + 'ms' : '--ms';

        const fullSlot = card.querySelector('.node-full-slot');
        if (fullSlot) fullSlot.innerHTML = node.isFull ? '<span class="node-full-badge">Full</span>' : '';

        const statusText = card.querySelector('.node-status-text');
        if (statusText) {
            statusText.textContent = node.isOnline ? 'Online' : 'Offline';
            statusText.style.color = statusColor;
        }

        const rows = card.querySelectorAll('.stat-row');
        const vals = [node.cpu, node.ram, node.disk];
        rows.forEach((row, i) => {
            const fill = row.querySelector('.progress-fill');
            const val = row.querySelector('.val');
            if (fill) {
                fill.style.width = vals[i] + '%';
                fill.className = `progress-fill ${colorClass(vals[i])}`;
            }
            if (val) val.textContent = vals[i] + '%';
        });
    }

    function capitalize(s) {
        return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function renderRosterSkeleton() {
        const contentDiv = document.getElementById('statusContent');
        let html = '';

        order.forEach(locKey => {
            const hostnames = nodeRoster[locKey];
            if (!hostnames || hostnames.length === 0) return;

            const config = locationConfig[locKey];
            const flagFile = config ? config.flag : '';
            const displayName = config ? config.displayName : locKey.replace('free.', '');

            html += `
                <div class="region-header">
                    <div class="region-left">
                        ${flagFile ? `<img src="assets/${flagFile}" alt="${locKey}" style="width: 24px; height: 16px; border-radius: 2px; object-fit: cover;">` : ''}
                        <div>
                            <h2>${displayName}</h2>
                            <p>${hostnames.length} nodes monitored</p>
                        </div>
                    </div>
                </div>
                <div class="node-grid">
            `;

            hostnames.forEach(hostname => {
                const nodeName = capitalize(hostname);
                const skeletonNode = { name: nodeName };
                html += `
                    <div class="node-card is-pinging" id="node-card-${nodeName}" onclick="openModal('${nodeName}')">
                        ${buildNodeCardHtml(skeletonNode, true)}
                    </div>
                `;
            });

            html += `</div>`;
        });

        contentDiv.innerHTML = html;

        renderedNodeKeys = order
            .filter(locKey => nodeRoster[locKey] && nodeRoster[locKey].length)
            .map(locKey => `${locKey}:false:` + nodeRoster[locKey].map(h => `${h}.mcserverhost.com`).join(','))
            .join('||');
    }

    function computeNodeKeysSignature(nodesByLocation) {
        return order
            .filter(locKey => nodesByLocation[locKey] && nodesByLocation[locKey].nodes.length)
            .map(locKey => `${locKey}:${nodesByLocation[locKey].isDangerZone}:` + nodesByLocation[locKey].nodes.map(n => n.hostname).join(','))
            .join('||');
    }

    function renderRegionsAndNodes(nodesByLocation) {
        const contentDiv = document.getElementById('statusContent');
        const newSig = computeNodeKeysSignature(nodesByLocation);

        const activeLocs = order.filter(locKey => nodesByLocation[locKey] && nodesByLocation[locKey].nodes.length);

        if (renderedNodeKeys === newSig && contentDiv.children.length > 0) {
            activeLocs.forEach(locKey => {
                const { nodes } = nodesByLocation[locKey];
                nodes.forEach(node => {
                    const card = document.getElementById(`node-card-${node.name}`);
                    if (card) updateNodeCardDom(card, node);
                });
            });
            return;
        }

        let html = '';
        activeLocs.forEach(locKey => {
            const { config, displayName, isDangerZone, nodes } = nodesByLocation[locKey];
            const flagFile = config ? config.flag : '';

            html += `
                <div class="region-header ${isDangerZone ? 'danger-zone' : ''}">
                    <div class="region-left">
                        ${flagFile ? `<img src="assets/${flagFile}" alt="${locKey}" style="width: 24px; height: 16px; border-radius: 2px; object-fit: cover;">` : ''}
                        <div>
                            <h2>${displayName} ${isDangerZone ? `<span class="load-warning-badge"><i class="fas fa-triangle-exclamation"></i> Location Full</span>` : ''}</h2>
                            <p>${nodes.length} nodes monitored</p>
                        </div>
                    </div>
                </div>
                <div class="node-grid">
            `;

            nodes.forEach(node => {
                html += `
                    <div class="node-card ${node.isFull ? 'is-full' : ''} is-pinging" id="node-card-${node.name}" onclick="openModal('${node.name}')">
                        ${buildNodeCardHtml(node, true)}
                    </div>
                `;
            });

            html += `</div>`;
        });

        contentDiv.innerHTML = html;
        renderedNodeKeys = newSig;

        requestAnimationFrame(() => {
            activeLocs.forEach(locKey => {
                const { nodes } = nodesByLocation[locKey];
                nodes.forEach(node => {
                    const card = document.getElementById(`node-card-${node.name}`);
                    if (card) updateNodeCardDom(card, node);
                });
            });
        });
    }

    async function loadStatusData() {
        const contentDiv = document.getElementById('statusContent');
        const isFirstLoad = renderedNodeKeys === null;

        try {
            const historyPromise = fetchWithTimeout('https://api.maximerix.dev/mcsh/status', 8000)
                .then(r => r.ok ? r.json() : Promise.reject(new Error('History API error')))
                .catch(err => {
                    console.error('History fetch failed or timed out:', err);
                    return { regions: [] };
                });

            const [liveResponse, availResponse] = await Promise.all([
                fetchWithTimeout('https://api.mcserverhost.com/status', 10000),
                fetchWithTimeout('https://api.mcserverhost.com/user/locations/availability', 10000)
            ]);

            if (!liveResponse.ok) throw new Error('Live API error');
            if (!availResponse.ok) throw new Error('Availability API error');

            const liveData = await liveResponse.json();
            const availData = await availResponse.json();

            const apiServices = liveData.services || [];
            const liveNodes = liveData.nodes || [];
            const locations = availData.locations || [];

            renderServicesGrid(apiServices);

            const capacityByLocation = {};
            locations.forEach(l => { capacityByLocation[l.name] = l.has_capacity; });

            if (!liveNodes || liveNodes.length === 0) {
                contentDiv.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding:40px;">No locations found.</div>`;
                renderedNodeKeys = null;
                return;
            }

            allNodesData = [];
            const nodesByLocation = {};

            for (const locKey of order) {
                const locNodes = liveNodes.filter(n => n.location === locKey);
                if (locNodes.length === 0) continue;

                const config = locationConfig[locKey];
                const displayName = config ? config.displayName : locKey.replace('free.', '');
                const isDangerZone = capacityByLocation[locKey] === false;

                const nodes = locNodes.map(node => {
                    let nodeName = node.node_name ? node.node_name.split('.')[0] : 'Unknown';
                    nodeName = nodeName.charAt(0).toUpperCase() + nodeName.slice(1);
                    const isOnline = node.status === 'online';
                    const isFull = node.is_full === true;
                    const cpu = Math.round(node.cpu_percent || 0);
                    const ram = Math.round(node.ram_percent || 0);
                    const disk = Math.round(node.disk_percent || 0);
                    const latency = (node.latency_ms !== undefined && node.latency_ms !== null) ? Math.round(node.latency_ms) : null;

                    const nodeEntry = {
                        name: nodeName,
                        hostname: node.node_name,
                        displayName: nodeName,
                        regionDisplay: displayName,
                        isOnline,
                        cpu,
                        ram,
                        disk,
                        latency,
                        flagFile: config ? config.flag : '',
                        incidents: [],
                        uptimeOverall: '--',
                        isFull
                    };
                    allNodesData.push(nodeEntry);
                    return nodeEntry;
                });

                nodesByLocation[locKey] = { config, displayName, isDangerZone, nodes };
            }

            renderRegionsAndNodes(nodesByLocation);

            historyPromise.then(historyData => {
                allNodesData.forEach(n => {
                    for (const region of (historyData.regions || [])) {
                        const found = region.nodes?.find(hn => 
                            hn.monitorTarget && hn.monitorTarget.toUpperCase() === n.hostname.toUpperCase()
                        );
                        if (found) {
                            n.incidents = found.incidentEvents90d || [];
                            n.uptimeOverall = found.uptimeOverall || '--';
                            break;
                        }
                    }
                    const card = document.getElementById(`node-card-${n.name}`);
                    if (card) card.classList.remove('is-pinging');
                });

                if (currentOpenModalNode) {
                    const stillOpenNode = allNodesData.find(n => n.name === currentOpenModalNode);
                    if (stillOpenNode) populateModal(stillOpenNode);
                }
            }).catch(err => {
                console.error('History patch failed:', err);
                allNodesData.forEach(n => {
                    const card = document.getElementById(`node-card-${n.name}`);
                    if (card) card.classList.remove('is-pinging');
                });
            });

        } catch (error) {
            console.error('Fetch Error:', error);
            if (isFirstLoad) {
                contentDiv.innerHTML = `<div style="color:#ff5252; text-align:center; padding:40px;">Failed to load data: ${error.message}</div>`;
                renderedNodeKeys = null;
            }
        }
    }

    function populateModal(nodeData) {
        document.getElementById('modalNodeName').innerText = nodeData.displayName.charAt(0).toUpperCase() + nodeData.displayName.slice(1);
        document.getElementById('modalNodeLocation').innerText = nodeData.regionDisplay;
        
        const flagImg = document.getElementById('modalNodeFlag');
        if(nodeData.flagFile) {
            flagImg.src = `assets/${nodeData.flagFile}`;
            flagImg.style.display = 'inline-block';
        } else {
            flagImg.style.display = 'none';
        }

        const statusColor = nodeData.isOnline ? 'var(--primary-color)' : '#ff5252';

        const totalDownSec = nodeData.incidents.reduce((sum, inc) => sum + (inc.durationSeconds || 0), 0);
        let downtimeStr;
        if (totalDownSec === 0) {
            downtimeStr = '0s';
        } else if (totalDownSec < 60) {
            downtimeStr = `${totalDownSec}s`;
        } else if (totalDownSec < 3600) {
            downtimeStr = `${Math.floor(totalDownSec / 60)}m ${totalDownSec % 60}s`;
        } else {
            const hrs = Math.floor(totalDownSec / 3600);
            const mins = Math.floor((totalDownSec % 3600) / 60);
            downtimeStr = `${hrs}h ${mins}m`;
        }

        const latencyDisplay = (nodeData.latency !== null && nodeData.latency !== undefined) ? `${nodeData.latency}ms` : '--ms';

        document.getElementById('modalStatsTable').innerHTML = `
            <div class="stats-cell"><span>Overall uptime</span><span class="green">${nodeData.uptimeOverall}</span></div>
            <div class="stats-cell"><span>Latency</span><span>${latencyDisplay}</span></div>
            <div class="stats-cell"><span>CPU load</span><span>${nodeData.cpu}%</span></div>
            <div class="stats-cell"><span>Memory usage</span><span>${nodeData.ram}%</span></div>
            <div class="stats-cell"><span>Disk usage</span><span>${nodeData.disk}%</span></div>
            <div class="stats-cell"><span>90-day downtime</span><span class="yellow">${downtimeStr}</span></div>
            <div class="stats-cell"><span>Node full</span><span class="${nodeData.isFull ? 'red' : ''}">${nodeData.isFull ? 'Yes' : 'No'}</span></div>
            <div class="stats-cell"><span>90-day incidents</span><span>${nodeData.incidents.length}</span></div>
            <div class="stats-cell" style="border-bottom:none;"><span>Status</span><span style="color:${statusColor};">${nodeData.isOnline ? 'Online' : 'Offline'}</span></div>
        `;

        const incidents = nodeData.incidents || [];
        const last7Days = [];
        for(let i=6; i>=0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            last7Days.push(d);
        }

        let historyHtml = '';
        last7Days.forEach(day => {
            const dayStr = day.toISOString().split('T')[0];
            const hasIncident = incidents.some(inc => {
                const incDate = new Date(inc.start).toISOString().split('T')[0];
                return incDate === dayStr;
            });
            const cls = hasIncident ? 'red' : 'green';
            const icon = hasIncident ? '<i class="fas fa-arrow-down" style="color:#0b0e1a;"></i>' : '<i class="fas fa-arrow-up" style="color:#0b0e1a;"></i>';
            const label = day.toLocaleDateString('en-GB', {day: 'numeric', month: 'short'});
            
            historyHtml += `
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div class="history-dot ${cls}">${icon}</div>
                    <div class="day-label">${label}</div>
                </div>
            `;
        });
        document.getElementById('modalHistoryRow').innerHTML = historyHtml;

        let incidentHtml = '';
        if (incidents.length > 0) {
            incidents.slice(0, 10).forEach(inc => {
                const durSec = inc.durationSeconds || 0;
                const mins = Math.floor(durSec / 60);
                const secs = durSec % 60;
                const durStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

                const start = new Date(inc.start);
                const end = new Date(inc.end);
                const timeStr = `${start.getDate()} ${start.toLocaleString('default', { month: 'short' })} ${start.getHours().toString().padStart(2, '0')}:${start.getMinutes().toString().padStart(2, '0')} – ${end.getHours().toString().padStart(2, '0')}:${end.getMinutes().toString().padStart(2, '0')}`;

                incidentHtml += `
                    <div class="incident-row">
                        <i class="fas fa-circle"></i>
                        <div class="duration">${durStr}</div>
                        <div class="time">${timeStr}</div>
                    </div>
                `;
            });
        } else {
            incidentHtml = `<div style="color:var(--text-muted); padding:10px;">No recent incidents recorded.</div>`;
        }
        document.getElementById('modalIncidents').innerHTML = incidentHtml;
    }

    function openModal(nodeName) {
        const nodeData = allNodesData.find(n => n.name === nodeName);
        
        if (!nodeData) {
            console.error("Could not find node data for:", nodeName);
            return;
        }

        currentOpenModalNode = nodeName;
        populateModal(nodeData);

        document.getElementById('nodeModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('nodeModal').classList.remove('active');
        document.body.style.overflow = 'auto';
        currentOpenModalNode = null;
    }

    document.getElementById('nodeModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    let isRefreshing = false;

    document.addEventListener('DOMContentLoaded', function() {
        renderServicesSkeleton();
        renderRosterSkeleton();
        loadStatusData();
        setInterval(function() {
            if (!isRefreshing) {
                isRefreshing = true;
                loadStatusData().finally(() => {
                    isRefreshing = false;
                });
            }
        }, 10000);
    });

    function showRefreshStatus() {
        const statusDiv = document.getElementById('refreshStatus') || createRefreshStatus();
        statusDiv.innerHTML = 'Updating...';
        setTimeout(() => {
            statusDiv.innerHTML = '✓ Live';
        }, 2000);
    }

    function createRefreshStatus() {
        const div = document.createElement('div');
        div.id = 'refreshStatus';
        div.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(12px);
            z-index: 999;
        `;
        div.innerHTML = '✓ Live';
        document.body.appendChild(div);
        return div;
    }

    const originalLoadStatusData = loadStatusData;
    loadStatusData = async function() {
        const refreshStatus = document.getElementById('refreshStatus');
        if (refreshStatus) refreshStatus.innerHTML = 'Updating...';
        
        try {
            await originalLoadStatusData.call(this);
            if (refreshStatus) refreshStatus.innerHTML = '✓ Live';
        } catch (error) {
            if (refreshStatus) refreshStatus.innerHTML = 'Error';
            throw error;
        }
    };
</script>
</body>
</html>
